name: CI/CD pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest

      - name: Build Docker Image
        run: |
          docker build -t flask-cicd-app:v1 .

      - name: Run Docker Container
        run: |
          docker run -d -p 5001:5001 flask-cicd-app:v1

      - name: Debug files
        run: |
          ls -al

      - name: Check images
        run: |
          docker images

      - name: Set env
        run: |
          export APP_ENV=testing
          echo $APP_ENV

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip
